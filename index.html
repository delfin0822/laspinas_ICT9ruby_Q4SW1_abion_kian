<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>

body{
    margin:0;
    padding:0;
    font-family: Arial, Helvetica, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#ede9f1,#cff1ff);
}


.container{
    background:white;
    width:350px;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0, 0, 0, 0.2);
}


.icon{
    width:70px;
    height:70px;
    border-radius:50%;
    border:3px solid #b5dcee;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    font-size:30px;
    color:#000000;
}


h2{
    margin:15px 0 25px;
    color:#000000;
}


label{
    display:block;
    text-align:left;
    margin-top:15px;
    margin-bottom:5px;
}


input[type=text],
input[type=password]{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #2abbd1;
    font-size:14px;
}


.options{
    display:flex;
    align-items:center;
    margin-top:15px;
    font-size:14px;
}


.buttons{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
}

.login-btn{
    background:linear-gradient(to right,#ffffff,#072a4d);
    color:rgb(0, 0, 0);
    border:none;
    padding:12px 30px;
    border-radius:10px;
    cursor:pointer;
}

.cancel-btn{
    background:white;
    border:1px solid #000000;
    padding:12px 30px;
    border-radius:10px;
    cursor:pointer;
}


hr{
    margin-top:25px;
}


.forgot{
    margin-top:10px;
}

.forgot a{
    color:#245ab0;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<div class="icon">👤</div>

<h2>Login</h2>

<form>

<label>Username</label>
<input type="text" placeholder="Enter username" required>

<label>Password</label>
<input type="password" placeholder="Enter password" required>

<div class="options">
<input type="checkbox"> &nbsp; Stay logged in
</div>

<div class="buttons">
<button class="login-btn">Login</button>
<button class="cancel-btn" type="reset">Cancel</button>
</div>

<hr>

<div class="forgot">
<a href="#">Forgot username / password?</a>
</div>

</form>

</div>

</body>
</html>
